{% extends 'pastpapers/base.html' %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="hero">
    <h1>Your Profile</h1>
    <p>Update your account details</p>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="notes-container">
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1rem;">
                <label>Username</label>
                <input type="text" value="{{ user.username }}" disabled style="width: 100%; padding: 0.5rem; background: #f5f5f5;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ user.first_name }}" style="width: 100%; padding: 0.5rem;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ user.last_name }}" style="width: 100%; padding: 0.5rem;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email }}" style="width: 100%; padding: 0.5rem;">
            </div>
            <button type="submit" class="check-btn" style="width: 100%;">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}
